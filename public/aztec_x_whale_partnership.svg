<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="gradAztec" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="gradWhale" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Aztec Network Emblem (Geometric, Cryptographic) -->
  <g transform="translate(150, 200)">
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40" fill="none" stroke="url(#gradAztec)" stroke-width="8" />
    <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" fill="none" stroke="#1e293b" stroke-width="4" stroke-dasharray="10 5" />
    <circle cx="0" cy="0" r="15" fill="url(#gradAztec)" filter="url(#glow)" />
    <path d="M0,-80 L0,0 M69,-40 L0,0 M69,40 L0,0 M0,80 L0,0 M-69,40 L0,0 M-69,-40 L0,0" stroke="#0f172a" stroke-width="2" opacity="0.5" />
  </g>

  <!-- Connection / Cross -->
  <g transform="translate(400, 200)" opacity="0.8">
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 6" />
    <line x1="0" y1="-80" x2="0" y2="80" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 6" />
    <circle cx="0" cy="0" r="8" fill="#475569" />
    <path d="M-15,-15 L15,15 M-15,15 L15,-15" stroke="#ffffff" stroke-width="3" />
  </g>

  <!-- Whale Alert Network Emblem (Fluid, Sonar, Deep Data) -->
  <g transform="translate(650, 200)">
    <circle cx="0" cy="0" r="75" fill="none" stroke="url(#gradWhale)" stroke-width="6" />
    <circle cx="0" cy="0" r="50" fill="none" stroke="#334155" stroke-width="3" opacity="0.7" />
    <circle cx="0" cy="0" r="25" fill="url(#gradWhale)" filter="url(#glow)" />
    <path d="M-75,0 Q0,50 75,0 T-75,0" fill="none" stroke="#0f172a" stroke-width="4" />
    <path d="M-50,-20 Q0,-60 50,-20" fill="none" stroke="#1e293b" stroke-width="3" stroke-dasharray="4 4" />
  </g>

  <!-- Text Labels -->
  <g text-anchor="middle" font-family="monospace" font-weight="900" font-size="18" fill="#020617" letter-spacing="4">
    <text x="150" y="320">AZTEC NETWORK</text>
    <text x="650" y="320">WHALE ALERT</text>
  </g>
  <g text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="10" fill="#64748b" letter-spacing="2">
    <text x="150" y="340">ZERO-KNOWLEDGE L2</text>
    <text x="650" y="340">ON-CHAIN INTELLIGENCE</text>
    <text x="400" y="240">SECURE DATA BRIDGE</text>
  </g>
</svg>
