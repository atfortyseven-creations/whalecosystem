<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whale Chat</title>
<style>

/* ─── RESET ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000000;
  color: #ffffff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* ─── GPU LAYER ─── */
.scene, .reveal-inner, .fade-up, #flash {
  will-change: transform, opacity;
  transform: translateZ(0);
  backface-visibility: hidden;
}

#stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.scene {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.45s cubic-bezier(0.25, 0, 0, 1);
}
.scene.visible { visibility: visible; }

/* ─── TYPOGRAPHY ─── */
.t-hero {
  font-size: clamp(56px, 9.5vw, 116px);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
}
.t-hero-light {
  font-size: clamp(56px, 9.5vw, 116px);
  font-weight: 300;
  letter-spacing: 0.02em;
  line-height: 1;
}
.t-sub {
  font-size: clamp(10px, 1.2vw, 14px);
  font-weight: 400;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
}
.t-statement {
  font-size: clamp(34px, 5.8vw, 74px);
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1.15;
  text-align: center;
}
.t-statement-dim {
  font-size: clamp(34px, 5.8vw, 74px);
  font-weight: 400;
  letter-spacing: -0.03em;
  line-height: 1.15;
  text-align: center;
  color: rgba(255,255,255,0.3);
}
.t-spec-num {
  font-size: clamp(38px, 5.8vw, 72px);
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1;
}
.t-spec-label {
  font-size: clamp(9px, 0.95vw, 11px);
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  margin-top: 14px;
  line-height: 1.5;
}
.t-social-handle {
  font-size: clamp(12px, 1.35vw, 16px);
  font-weight: 400;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.6);
}
.t-url {
  font-size: clamp(11px, 1.1vw, 14px);
  font-weight: 400;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.3);
}

/* ─── ANIMATIONS ─── */
.reveal-wrap { overflow: hidden; display: block; }
.reveal-inner {
  display: block;
  transform: translate3d(0, 104%, 0);
  transition: transform 0.68s cubic-bezier(0.25, 0, 0, 1);
}
.reveal-wrap.show .reveal-inner { transform: translate3d(0, 0, 0); }

.fade-up {
  opacity: 0;
  transform: translate3d(0, 12px, 0);
  transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.25, 0, 0, 1);
}
.fade-up.show { opacity: 1; transform: translate3d(0, 0, 0); }

/* ─── SCENE 1 ─── */
#s1 { gap: 0; }
#s1 .row { display: flex; align-items: baseline; gap: clamp(10px, 1.4vw, 18px); }
#s1 .sub-wrap { margin-top: clamp(24px, 3vh, 38px); }

/* ─── SCENE 2 ─── */
#s2 { gap: clamp(48px, 6vh, 76px); }
.wire-diagram { display: flex; align-items: center; }
.node-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ffffff;
  opacity: 0;
  transition: opacity 0.35s ease;
  flex-shrink: 0;
}
.node-dot.show { opacity: 1; }
.wire-center {
  width: clamp(140px, 28vw, 360px);
  height: 1px;
  position: relative;
  flex-shrink: 0;
  margin: 0 clamp(16px, 2.5vw, 32px);
}
.wire-half {
  position: absolute;
  top: 0; height: 1px;
  background: rgba(255,255,255,0.2);
  width: 0%;
  transition: width 0.85s cubic-bezier(0.25, 0, 0, 1);
}
.wire-half.left  { right: 50%; }
.wire-half.right { left:  50%; }
.wire-center.show .wire-half { width: 50%; }
.wire-lock {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity 0.4s ease 0.75s;
}
.wire-center.show .wire-lock { opacity: 0.8; }
.photon {
  position: absolute;
  top: 50%; left: 0%;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #ffffff;
  box-shadow: 0 0 12px 2px rgba(255,255,255,0.4);
  transform: translate3d(0, -50%, 0);
  opacity: 0;
  transition: transform 0s, opacity 0.12s ease;
}
.s2-labels {
  display: flex;
  gap: clamp(16px, 2.5vw, 32px);
  align-items: center;
}
.s2-label-item {
  display: flex;
}

/* ─── SCENE 3 ─── */
#s3 { gap: clamp(6px, 1vh, 12px); }

/* ─── SCENE 4 ─── */
#s4 { flex-direction: row; align-items: flex-start; }
.spec-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 0 clamp(32px, 5vw, 80px);
}
.spec-divider {
  width: 1px;
  height: clamp(60px, 8vh, 88px);
  background: rgba(255,255,255,0.15);
  align-self: center;
  opacity: 0;
  transition: opacity 0.45s ease;
  flex-shrink: 0;
}
.spec-divider.show { opacity: 1; }

/* ─── SCENE 5 — FINALE ─── */
#s5 {
  justify-content: center;
  gap: 0;
}

#s5 .finale-main  { margin-bottom: clamp(14px, 1.8vh, 24px); }
#s5 .finale-tag   { margin-bottom: clamp(32px, 4.5vh, 56px); }

.social-row {
  display: flex;
  align-items: center;
  gap: clamp(10px, 1.2vw, 14px);
  opacity: 0;
  transform: translate3d(0, 10px, 0);
  transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.25,0,0,1);
  margin-bottom: clamp(10px, 1.4vh, 16px);
}
.social-row.show { opacity: 1; transform: translate3d(0,0,0); }

.url-row {
  opacity: 0;
  transform: translate3d(0, 10px, 0);
  transition: opacity 0.55s ease 0.18s, transform 0.55s cubic-bezier(0.25,0,0,1) 0.18s;
  margin-bottom: clamp(36px, 5.5vh, 72px);
}
.url-row.show { opacity: 1; transform: translate3d(0,0,0); }

/* ─── PARTNERS BAR ─── */
.partners-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(16px, 2.2vh, 24px);
  opacity: 0;
  transform: translate3d(0, 14px, 0);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.25,0,0,1);
}
.partners-section.show { opacity: 1; transform: translate3d(0,0,0); }

.partners-label {
  font-size: clamp(8px, 0.8vw, 10px);
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
}

.partners-row {
  display: flex;
  align-items: center;
  gap: clamp(24px, 4.5vw, 64px);
}

.partner {
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.5;
  transition: opacity 0.3s ease;
  flex-shrink: 0;
}

/* AZTEC SPECIFIC SIZING (Larger) */
.partner-aztec svg {
  height: clamp(20px, 2.5vw, 26px); /* Larger relative height */
  width: auto;
}

/* OTHER PARTNERS SIZING (Smaller) */
.partner-standard svg,
.partner-standard img {
  height: clamp(12px, 1.5vw, 16px); /* Smaller relative height */
  width: auto;
}

.partner svg, .partner img {
  display: block;
  filter: brightness(0) invert(1);
}

/* ─── SHARED ─── */
#flash {
  position: fixed; inset: 0;
  background: #ffffff; opacity: 0;
  pointer-events: none; z-index: 50;
}
#vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
  pointer-events: none; z-index: 5;
}
#bar {
  position: fixed; bottom: 0; left: 0;
  height: 1px; width: 0%;
  background: rgba(255,255,255,0.25);
  z-index: 100;
  will-change: width;
}

</style>
</head>
<body>

<div id="vignette"></div>
<div id="flash"></div>

<div id="stage">

  <!-- SCENE 1 — LOGO -->
  <div class="scene" id="s1">
    <div class="row">
      <div class="reveal-wrap">
        <span class="reveal-inner t-hero">Whale</span>
      </div>
      <div class="reveal-wrap" style="transition-delay:0.07s">
        <span class="reveal-inner t-hero-light">Chat</span>
      </div>
    </div>
    <div class="sub-wrap">
      <div class="fade-up t-sub" style="transition-delay:0.48s">
        End-to-End Encrypted Messaging
      </div>
    </div>
  </div>

  <!-- SCENE 2 — ENCRYPTION DIAGRAM -->
  <div class="scene" id="s2">
    <div class="wire-diagram">
      <div class="node-dot" id="ndA"></div>
      <div class="wire-center" id="wcl">
        <div class="wire-half left"></div>
        <div class="wire-half right"></div>
        <div class="wire-lock">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <div class="photon" id="ph"></div>
      </div>
      <div class="node-dot" id="ndB"></div>
    </div>
    <div class="fade-up s2-labels" id="s2label" style="transition-delay:1.5s">
      <span class="t-sub s2-label-item">AES-256-GCM</span>
      <span class="t-sub s2-label-item" style="opacity: 0.3;">|</span>
      <span class="t-sub s2-label-item">XMTP Protocol</span>
      <span class="t-sub s2-label-item" style="opacity: 0.3;">|</span>
      <span class="t-sub s2-label-item">X25519</span>
    </div>
  </div>

  <!-- SCENE 3 — STATEMENT -->
  <div class="scene" id="s3">
    <div class="reveal-wrap">
      <span class="reveal-inner t-statement">Your messages.</span>
    </div>
    <div class="reveal-wrap" style="transition-delay:0.13s">
      <span class="reveal-inner t-statement-dim">Nobody else reads them.</span>
    </div>
    <div class="reveal-wrap" style="transition-delay:0.26s; margin-top:clamp(16px,2.5vh,26px)">
      <span class="reveal-inner t-statement">Not even us.</span>
    </div>
  </div>

  <!-- SCENE 4 — SPECS -->
  <div class="scene" id="s4">
    <div class="spec-col">
      <div class="reveal-wrap">
        <span class="reveal-inner t-spec-num">256-bit</span>
      </div>
      <div class="fade-up t-spec-label" style="transition-delay:0.18s">
        AES-GCM<br>Encryption
      </div>
    </div>
    <div class="spec-divider" id="sd1"></div>
    <div class="spec-col">
      <div class="reveal-wrap" style="transition-delay:0.13s">
        <span class="reveal-inner t-spec-num">E2EE</span>
      </div>
      <div class="fade-up t-spec-label" style="transition-delay:0.31s">
        On-Chain<br>Identity
      </div>
    </div>
    <div class="spec-divider" id="sd2"></div>
    <div class="spec-col">
      <div class="reveal-wrap" style="transition-delay:0.26s">
        <span class="reveal-inner t-spec-num">P2P</span>
      </div>
      <div class="fade-up t-spec-label" style="transition-delay:0.44s">
        Decentralized<br>Protocol
      </div>
    </div>
  </div>

  <!-- SCENE 5 — FINALE -->
  <div class="scene" id="s5">

    <!-- Title -->
    <div class="finale-main reveal-wrap">
      <span class="reveal-inner t-hero">Whale Chat.</span>
    </div>

    <!-- Tagline -->
    <div class="finale-tag fade-up t-sub" style="transition-delay:0.28s">
      Private by design.
    </div>

    <!-- Twitter -->
    <div class="social-row" id="socialRow">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="white">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.715-6.193-5.389
          6.193H2.756l7.73-8.835L2.318 2.25H9.08l4.226 5.588zm-1.161
          17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      <span class="t-social-handle">@whalecosystem</span>
    </div>

    <!-- Website -->
    <div class="url-row" id="urlRow">
      <span class="t-url">humanidfi.com</span>
    </div>

    <!-- Partners -->
    <div class="partners-section" id="partnersSection">
      <div class="partners-label">Built with</div>
      <div class="partners-row">

        <!-- AZTEC (Larger) -->
        <div class="partner partner-aztec">
          <svg viewBox="0 0 340 88" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="36,4 66,20 66,54 36,70 6,54 6,20"
              stroke="white" stroke-width="5" fill="none"/>
            <line x1="36" y1="4"  x2="36" y2="37" stroke="white" stroke-width="2.5" opacity="0.4"/>
            <line x1="66" y1="20" x2="36" y2="37" stroke="white" stroke-width="2.5" opacity="0.4"/>
            <line x1="66" y1="54" x2="36" y2="37" stroke="white" stroke-width="2.5" opacity="0.4"/>
            <line x1="36" y1="70" x2="36" y2="37" stroke="white" stroke-width="2.5" opacity="0.4"/>
            <line x1="6"  y1="54" x2="36" y2="37" stroke="white" stroke-width="2.5" opacity="0.4"/>
            <line x1="6"  y1="20" x2="36" y2="37" stroke="white" stroke-width="2.5" opacity="0.4"/>
            <circle cx="36" cy="37" r="4" fill="white"/>
            <text x="88" y="56" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
              font-weight="800" font-size="44" letter-spacing="-1" fill="white">AZTEC</text>
          </svg>
        </div>

        <!-- XMTP (Smaller) -->
        <div class="partner partner-standard">
          <svg viewBox="0 0 100 100" fill="none">
            <circle cx="50" cy="50" r="6" fill="white"/>
            <ellipse cx="50" cy="50" rx="46" ry="15" fill="none" stroke="white" stroke-width="2.5"/>
            <ellipse cx="50" cy="50" rx="46" ry="15" fill="none" stroke="white" stroke-width="2.5" transform="rotate(60 50 50)"/>
            <ellipse cx="50" cy="50" rx="46" ry="15" fill="none" stroke="white" stroke-width="2.5" transform="rotate(120 50 50)"/>
          </svg>
        </div>

        <!-- MetaMask (Smaller) -->
        <div class="partner partner-standard">
          <img src="./wallets/metamask.svg" alt="MetaMask">
        </div>

        <!-- WalletConnect (Smaller) -->
        <div class="partner partner-standard">
          <svg viewBox="0 0 300 185" fill="none">
            <path d="M61 57C107 12 193 12 239 57" stroke="white" stroke-width="30" stroke-linecap="round"/>
            <path d="M36 90L91 145L150 90" stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M150 90L209 145L264 90" stroke="white" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>

        <!-- Cloudflare (Smaller) -->
        <div class="partner partner-standard">
          <svg viewBox="0 0 88 56" fill="white">
            <circle cx="22" cy="34" r="18"/>
            <circle cx="38" cy="26" r="20"/>
            <circle cx="56" cy="30" r="16"/>
            <circle cx="68" cy="36" r="12"/>
            <rect x="4" y="36" width="80" height="16" rx="0"/>
          </svg>
        </div>

      </div>
    </div>

  </div>

</div>

<div id="bar"></div>

<script>
'use strict';

const TOTAL_MS = 20000;
let startTs = null;

const $ = id => document.getElementById(id);

function showScene(id){
  const el=$(id);
  el.classList.add('visible');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ el.style.opacity='1'; }));
}
function hideScene(id){
  const el=$(id);
  el.style.opacity='0';
  setTimeout(()=>el.classList.remove('visible'),500);
}
function activateScene(id){
  showScene(id);
  const el=$(id);
  setTimeout(()=>{
    el.querySelectorAll('.reveal-wrap').forEach(e=>e.classList.add('show'));
    el.querySelectorAll('.fade-up').forEach(e=>e.classList.add('show'));
  }, 55);
}
function deactivateScene(id){
  const el=$(id);
  el.querySelectorAll('.reveal-wrap').forEach(e=>e.classList.remove('show'));
  el.querySelectorAll('.fade-up').forEach(e=>e.classList.remove('show'));
  hideScene(id);
}
function flash(){
  const f=$('flash');
  f.style.transition='none';
  f.style.opacity='0.25';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    f.style.transition='opacity 0.32s ease';
    f.style.opacity='0';
  }));
}

// Photon
let photonRunning=false;
function runPhoton(){
  photonRunning=true;
  const ph=$('ph'), wire=$('wcl');
  function cycle(){
    if(!photonRunning)return;
    const maxX=wire.offsetWidth-8;
    ph.style.transition='none';
    ph.style.transform='translate3d(0,-50%,0)';
    ph.style.opacity='0';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      if(!photonRunning)return;
      ph.style.opacity='1';
      ph.style.transition='transform 0.92s cubic-bezier(0.25,0,0.75,1),opacity 0.12s ease';
      ph.style.transform=`translate3d(${maxX}px,-50%,0)`;
      setTimeout(()=>{ if(!photonRunning)return; ph.style.opacity='0'; setTimeout(cycle,360); },860);
    }));
  }
  cycle();
}
function stopPhoton(){
  photonRunning=false;
  $('ph').style.opacity='0';
}

// Script
const events=[
  { at:0,    fn:()=>activateScene('s1') },
  { at:3300, fn:()=>{ flash(); deactivateScene('s1'); } },

  { at:3500, fn:()=>{
    activateScene('s2');
    setTimeout(()=>$('ndA').classList.add('show'),180);
    setTimeout(()=>$('ndB').classList.add('show'),360);
    setTimeout(()=>$('wcl').classList.add('show'),520);
    setTimeout(()=>$('s2label').classList.add('show'),1800);
    setTimeout(()=>runPhoton(),1400);
  }},
  { at:8300, fn:()=>{
    flash(); stopPhoton(); deactivateScene('s2');
    ['ndA','ndB','wcl','s2label'].forEach(id=>$(id).classList.remove('show'));
  }},

  { at:8500, fn:()=>activateScene('s3') },
  { at:13300,fn:()=>{ flash(); deactivateScene('s3'); } },

  { at:13500,fn:()=>{
    activateScene('s4');
    setTimeout(()=>{ $('sd1').classList.add('show'); $('sd2').classList.add('show'); },180);
  }},
  { at:17300,fn:()=>{
    flash(); deactivateScene('s4');
    $('sd1').classList.remove('show'); $('sd2').classList.remove('show');
  }},

  { at:17500,fn:()=>{
    activateScene('s5');
    setTimeout(()=>$('socialRow').classList.add('show'),   620);
    setTimeout(()=>$('urlRow').classList.add('show'),      820);
    setTimeout(()=>$('partnersSection').classList.add('show'), 1100);
  }},
];

const fired=new Array(events.length).fill(false);

function loop(ts){
  if(!startTs) startTs=ts;
  const elapsed=ts-startTs;
  $('bar').style.width=Math.min(elapsed/TOTAL_MS*100,100)+'%';
  for(let i=0;i<events.length;i++){
    if(!fired[i]&&elapsed>=events[i].at){ fired[i]=true; events[i].fn(); }
  }
  if(elapsed<TOTAL_MS+600) requestAnimationFrame(loop);
}

['s1','s2','s3','s4','s5'].forEach(id=>{
  const el=$(id);
  el.style.opacity='0';
  el.style.transition='opacity 0.45s cubic-bezier(0.25,0,0,1)';
});

requestAnimationFrame(loop);
</script>
</body>
</html>
