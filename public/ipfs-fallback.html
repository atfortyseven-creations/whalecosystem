<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanity Ledger - Immortal Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { createWeb3Modal, defaultWagmiConfig } from 'https://esm.sh/@web3modal/wagmi@4.1.2';
        import { mainnet, base, polygon } from 'https://esm.sh/viem@2.9.16/chains';
        import { reconnect, getAccount, getBalance } from 'https://esm.sh/@wagmi/core@2.6.5';
        
        const projectId = 'eec9d30c5e7b2ff93766a50eef533f86'; // Reown ID
        const metadata = {
            name: 'Humanity Ledger',
            description: 'Immortal Web3 Interface',
            url: 'https://humanidfi.com', 
            icons: ['https://avatars.githubusercontent.com/u/37784886']
        }
        
        const chains = [mainnet, base, polygon]
        const wagmiConfig = defaultWagmiConfig({ chains, projectId, metadata })
        
        reconnect(wagmiConfig);
        
        const modal = createWeb3Modal({ wagmiConfig, projectId, chains })

        document.getElementById('connect-btn').addEventListener('click', () => {
            modal.open()
        });

        // Simple loop to check connection status
        setInterval(async () => {
            const account = getAccount(wagmiConfig);
            if (account.isConnected) {
                document.getElementById('status').innerText = `Connected: ${account.address.slice(0,6)}...${account.address.slice(-4)}`;
                document.getElementById('connect-btn').innerText = 'Disconnect';
                document.getElementById('connect-btn').onclick = () => modal.disconnect();
                
                // Read balance purely from blockchain (No Railway Backend)
                try {
                    const balance = await getBalance(wagmiConfig, { address: account.address, chainId: base.id });
                    document.getElementById('balance-display').innerText = `Balance: ${parseFloat(balance.formatted).toFixed(4)} ETH (Base)`;
                } catch(e) {
                    console.error(e);
                }
            } else {
                document.getElementById('status').innerText = 'System Running (Decentralized)';
                document.getElementById('connect-btn').innerText = 'Connect Wallet';
                document.getElementById('balance-display').innerText = '';
            }
        }, 2000);
    </script>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', Courier, monospace; }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-center">
    
    <div class="max-w-md w-full border border-[#00ffcc] p-8 shadow-[0_0_15px_#00ffcc]">
        <h1 class="text-3xl font-bold mb-4 glitch uppercase tracking-widest">Project Aegis</h1>
        <p class="mb-8 text-sm opacity-80">This is an immortal, IPFS-hosted fallback interface. It cannot be taken offline by DDoS attacks.</p>
        
        <div class="mb-8 h-px w-full bg-[#00ffcc] opacity-30"></div>
        
        <p id="status" class="mb-4">Initializing Web3 Matrix...</p>
        <p id="balance-display" class="mb-8 text-xl font-bold text-white"></p>

        <button id="connect-btn" class="border border-[#00ffcc] px-6 py-3 uppercase tracking-wider hover:bg-[#00ffcc] hover:text-black transition-colors">
            Connect Matrix
        </button>
    </div>

    <p class="mt-8 text-xs opacity-50">Served from Arweave/IPFS • Zero Backend Dependency</p>
</body>
</html>
