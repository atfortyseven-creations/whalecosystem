version: '3.8'

services:
  # Next.js Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npx", "next", "start", "-p", "3000", "-H", "0.0.0.0"]
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://[REDACTED_DB_USER]:[REDACTED_DB_PASS]@postgres:5432/ominverse?schema=public
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=SystemLevel9
      - REDIS_URL=redis://[REDACTED_REDIS_USER]:[REDACTED_REDIS_PASS]@postgres:5432/ominverse?schema=public
      - REDIS_URL=redis://[REDACTED_REDIS_USER]:[REDACTED_REDIS_PASS]@postgres:5432/ominverse?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - system-net


  # Aztec Sandbox (Sequencer + Prover + Node + PXE)
  aztec-sandbox:
    image: aztecprotocol/aztec-sandbox:latest
    ports:
      - "8080:8080" # PXE
      - "8081:8081" # Node
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - LOG_LEVEL=debug
      - AZTEC_CHAIN_ID=aztec-testnet-2026
      - BARRETENBERG_BACKEND=ultrahonk
    networks:
      - system-net

networks:
  system-net:

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
