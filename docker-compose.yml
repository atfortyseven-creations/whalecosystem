version: '3.8'

services:
  # Next.js Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npx", "next", "start", "-p", "3000", "-H", "0.0.0.0"]
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://[REDACTED_DB_USER]:[REDACTED_DB_PASS]@postgres:5432/ominverse?schema=public
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=SovereignLevel9
      - REDIS_URL=redis://[REDACTED_REDIS_USER]:[REDACTED_REDIS_PASS]@postgres:5432/ominverse?schema=public
      - REDIS_URL=redis://[REDACTED_REDIS_USER]:[REDACTED_REDIS_PASS]@postgres:5432/ominverse?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - sovereign-net

networks:
  sovereign-net:

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
