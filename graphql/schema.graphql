# graphql/schema.graphql

# 
# SCALARS
# 
scalar DateTime

# 
# KNOWLEDGE GRAPH ENTITIES (NEO4J FEDERATED)
# 

interface Entity {
  slug: ID!
  name: String!
}

type Person implements Entity {
  slug: ID!
  name: String!
  capitalInfluenced: Float!
  role: String
  foundedCompanies: [Company!]!
  ownedWallets: [Wallet!]!
}

type Company implements Entity {
  slug: ID!
  name: String!
  type: String # "VC", "Exchange", "Development"
  issuedTokens: [Token!]!
  associatedPople: [Person!]!
}

type Token implements Entity {
  slug: ID!
  name: String!
  symbol: String!
  marketCap: Float
  nativeEcosystem: Ecosystem
  belongingSectors: [SectorGraph!]!
}

type Wallet {
  address: ID!
  balanceUsd: Float!
  owners: [Person!]!
}

type SectorGraph {
  slug: ID!
  name: String!
  tokens: [Token!]!
}

type Ecosystem {
  slug: ID!
  name: String!
  tokens: [Token!]!
}

union EntityResult = Person | Company | Token

# 
# PRISMA ENTITIES (RELATIONAL DATA)
# 

type Article {
  id: ID!
  title: String!
  content: String!
  sentiment: Float!
  bias: String!
  category: String!
  publishedAt: DateTime!
  author: String!
}

type SectorMetrics {
  id: ID!
  slug: String!
  name: String!
  description: String
  totalTvl: Float!
  volume24h: Float!
  zScore: Float!
  rotationSignal: String
  recentArticles: [Article!]!
}

type AuditNode {
  id: ID!
  platformName: String!
  slug: String!
  type: String!
  isVerifiedOnChain: Boolean!
  smartContractRef: String
  solvencyStatus: String!
  systemBridgeUrl: String!
  features: [String!]!
  supportedChains: [String!]!
}

type EcosystemWarRoomData {
  id: ID!
  chainName: String!
  chainSymbol: String!
  totalEntities: Int!
  tvl: Float!
  volume24h: Float!
  lastUpdated: DateTime!
}

# 
# QUERIES & MUTATIONS
# 

type Query {
  # PHASE 1: Knowledge Graph Queries
  whaleDirectorySearch(query: String!): [EntityResult!]!
  getPersonDetails(slug: String!): Person
  getCompanyDetails(slug: String!): Company
  getTokenDetails(symbol: String!): Token

  # PHASE 2: Market Segmentation
  getSectorMetrics(slug: String!): SectorMetrics
  getAllSectors(limit: Int = 103): [SectorMetrics!]!
  getEcosystemWarRoom: [EcosystemWarRoomData!]!
  getGlobalCapitalRotation: String! # E.g., "Liquidity rotating from Memecoins -> AI"

  # PHASE 3: System Gold Standard
  getGoldRegistry(type: String): [AuditNode!]!
  
  # Articles / Tri-Layer Content Grid
  getLatestNews(sentiment: String, limit: Int = 50): [Article!]!
}

type Mutation {
  # Triggered by System Node Syndicate Daemon
  ingestArticle(title: String!, content: String!, category: String!, author: String!): Article!
  
  # Smart Contract Validation Handlers
  updateAuditSolvency(slug: String!, isVerified: Boolean!, status: String!, contractRef: String): AuditNode!
}
