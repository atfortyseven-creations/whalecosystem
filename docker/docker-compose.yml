version: '3.8'

services:
  # Sovereign Terminal App
  web:
    build:
      context: ../
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://sovereign:whale@postgres:5432/whalealert?schema=public
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=SovereignLevel9
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - neo4j
      - redis
    networks:
      - sovereign-net

  # PostgreSQL Data Layer
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: whale
      POSTGRES_DB: whalealert
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sovereign-net

  # Neo4j Graph Engine for Elite Clusters
  neo4j:
    image: neo4j:5.11
    environment:
      NEO4J_AUTH: neo4j/SovereignLevel9
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - sovereign-net

  # Redis Mempool Buffer
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sovereign-net

  # Background Indexer (Whale Worker)
  worker:
    build:
      context: ../
      dockerfile: Dockerfile.worker
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - REDIS_URL=redis://redis:6379
      - LITE_MODE=false
    depends_on:
      - redis
      - neo4j
    networks:
      - sovereign-net

networks:
  sovereign-net:

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
