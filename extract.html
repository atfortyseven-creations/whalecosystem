<!DOCTYPE html>
<html>
<head>
    <title>Video Color Extractor</title>
</head>
<body>
    <video id="vid" src="public/models/8OV12va1Xpqh0v6B9NYUVnm9EJY.mp4" controls autoplay muted></video>
    <canvas id="canvas" width="100" height="100"></canvas>
    <div id="result" style="font-size: 24px; font-weight: bold; margin-top: 20px;"></div>

    <script>
        const video = document.getElementById('vid');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const result = document.getElementById('result');

        video.addEventListener('loadeddata', () => {
            // Draw a frame to canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Get pixel data from top left
            const pixelData = ctx.getImageData(10, 10, 1, 1).data;
            
            // Convert to hex
            const hex = "#" + 
                ("00" + pixelData[0].toString(16)).slice(-2) +
                ("00" + pixelData[1].toString(16)).slice(-2) +
                ("00" + pixelData[2].toString(16)).slice(-2);
                
            result.innerText = "Extracted Color: " + hex;
            document.body.style.backgroundColor = hex;
            console.log(hex);
        });
    </script>
</body>
</html>
