# Whale Alert Helm Chart  Default Values
# Override any value at install time with --set key=value

#  Image 
image:
  repository: ghcr.io/atfortyseven-creations/whale-alert
  tag:        "3.0.0"
  pullPolicy: Always

#  Replicas 
replicaCount:
  app:      2     # App pods (HPA will scale 210)
  scanner:  1     # Always 1 to prevent duplicate detection
  telegram: 1     # Always 1 notifier

#  Secrets (inject via --set or external secret store) 
secrets:
  databaseUrl:      ""     # postgresql://[REDACTED_DB_USER]:[REDACTED_DB_PASS]@host:5432/db
  redisUrl:         ""     # redis://[REDACTED_REDIS_USER]:[REDACTED_REDIS_PASS]@HumanidFi"
  telegramTopicId:  "1367"
  nextauthSecret:   ""
  clerkPublishableKey: ""
  clerkSecretKey:   ""

#  Config 
config:
  nodeEnv:            "production"
  whaleThresholdUsd:  "50000"
  detectionChains:    "BASE,ETHEREUM,BSC,SOLANA,BITCOIN"
  sseKeepAliveMs:     "20000"
  nextauthUrl:        "https://whalealert.network"

#  Resources 
resources:
  app:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: 1000m, memory: 2Gi }
  scanner:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: 2000m, memory: 4Gi }
  telegram:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }

#  Autoscaling 
autoscaling:
  enabled:     true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage:    70
  targetMemoryUtilizationPercentage: 80

#  Ingress 
ingress:
  enabled:          true
  className:        "nginx"
  certIssuer:       "letsencrypt-prod"
  hosts:
    - host: whalealert.network
      paths: [{ path: "/", pathType: "Prefix" }]
    - host: api.whalealert.network
      paths: [{ path: "/", pathType: "Prefix" }]
  tls:
    - secretName: whale-alert-tls
      hosts: [whalealert.network, api.whalealert.network]

#  PodDisruptionBudget 
pdb:
  enabled:      true
  minAvailable: 1

#  Service 
service:
  type: ClusterIP
  port: 80
  targetPort: 3000

#  Enterprise Edition 
enterprise:
  enabled: false       # Set true to enable Enterprise API features
  supportEmail: ""
  slaSupportLevel: "standard"  # standard | premium | platinum
