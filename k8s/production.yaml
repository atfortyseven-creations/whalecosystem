# 
# WHALE ALERT NETWORK  Kubernetes Production Stack
# Institutional-grade Kubernetes manifests
# 
# Components:
#   - Next.js Application Deployment (app)
#   - Whale Worker Deployment (scanner)
#   - Telegram Worker Deployment (notifier)
#   - Redis StatefulSet (queue)
#   - Horizontal Pod Autoscaler
#   - PodDisruptionBudget (zero-downtime rolling updates)
#   - Ingress with TLS (cert-manager)
#
# Apply all:
#   kubectl apply -f k8s/
#
# Prerequisites:
#   - cert-manager installed (for TLS)
#   - NGINX Ingress Controller
#   - Secrets provisioned via: kubectl apply -f k8s/secrets.yaml
# 

---
#  Secrets (populate externally, never commit values) 
# kubectl create secret generic whale-alert-secrets \
#   --from-literal=DATABASE_URL=postgresql://... \
#   --from-literal=REDIS_URL=redis://... \
#   --from-literal=ALCHEMY_API_KEY=... \
#   --from-literal=TELEGRAM_BOT_TOKEN=... \
#   --from-literal=NEXTAUTH_SECRET=... \
#   --namespace=whale-alert

---
#  ConfigMap 
apiVersion: v1
kind: ConfigMap
metadata:
  name: whale-alert-config
  namespace: whale-alert
  labels:
    app.kubernetes.io/name: whale-alert
    app.kubernetes.io/component: config
data:
  NODE_ENV:              "production"
  WHALE_THRESHOLD_USD:   "50000"
  DETECTION_CHAINS:      "BASE,ETHEREUM,BSC,SOLANA,BITCOIN"
  SSE_KEEP_ALIVE_MS:     "20000"
  REDIS_QUEUE_NAME:      "whale-events"
  LOG_LEVEL:             "info"
  NEXTAUTH_URL:          "https://whalealert.network"
  SKIP_ENV_VALIDATION:   "false"

---
#  Deployment: Next.js Application 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whale-alert-app
  namespace: whale-alert
  labels:
    app.kubernetes.io/name: whale-alert
    app.kubernetes.io/component: app
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: whale-alert-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime guaranteeed
  template:
    metadata:
      labels:
        app: whale-alert-app
        version: "3.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/api/metrics"
        prometheus.io/port:   "3000"
    spec:
      serviceAccountName: whale-alert-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: ghcr.io/humanityledger/whale-alert:3.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http
          envFrom:
            - configMapRef:
                name: whale-alert-config
            - secretRef:
                name: whale-alert-secrets
          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: whale-alert-app
                topologyKey: kubernetes.io/hostname

---
#  Deployment: Whale Scanner Worker 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whale-scanner
  namespace: whale-alert
  labels:
    app.kubernetes.io/name: whale-alert
    app.kubernetes.io/component: scanner
spec:
  replicas: 1                   # Single scanner to prevent duplicate detection
  selector:
    matchLabels:
      app: whale-scanner
  strategy:
    type: Recreate               # No duplicate scanners during rollout
  template:
    metadata:
      labels:
        app: whale-scanner
    spec:
      serviceAccountName: whale-alert-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: scanner
          image: ghcr.io/humanityledger/whale-alert:3.0.0
          imagePullPolicy: Always
          command: ["node", "--max-old-space-size=4096", "-e", "require('./scripts/whale-worker')"]
          envFrom:
            - configMapRef:
                name: whale-alert-config
            - secretRef:
                name: whale-alert-secrets
          resources:
            requests:
              cpu:    "500m"
              memory: "1Gi"
            limits:
              cpu:    "2000m"
              memory: "4Gi"
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 30
            periodSeconds: 60

---
#  Deployment: Telegram Notifier Worker 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whale-telegram
  namespace: whale-alert
  labels:
    app.kubernetes.io/name: whale-alert
    app.kubernetes.io/component: notifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whale-telegram
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: whale-telegram
    spec:
      serviceAccountName: whale-alert-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: telegram
          image: ghcr.io/humanityledger/whale-alert:3.0.0
          imagePullPolicy: Always
          command: ["npx", "tsx", "scripts/telegram-worker.ts"]
          envFrom:
            - configMapRef:
                name: whale-alert-config
            - secretRef:
                name: whale-alert-secrets
          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"

---
#  Service: App 
apiVersion: v1
kind: Service
metadata:
  name: whale-alert-app-svc
  namespace: whale-alert
  labels:
    app.kubernetes.io/name: whale-alert
    app.kubernetes.io/component: app
spec:
  selector:
    app: whale-alert-app
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  type: ClusterIP

---
#  HorizontalPodAutoscaler 
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: whale-alert-hpa
  namespace: whale-alert
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: whale-alert-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300      # 5min cooldown before scale-down

---
#  PodDisruptionBudget 
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: whale-alert-pdb
  namespace: whale-alert
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: whale-alert-app

---
#  ServiceAccount 
apiVersion: v1
kind: ServiceAccount
metadata:
  name: whale-alert-sa
  namespace: whale-alert
  labels:
    app.kubernetes.io/name: whale-alert
automountServiceAccountToken: false

---
#  Ingress (NGINX + cert-manager TLS) 
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whale-alert-ingress
  namespace: whale-alert
  annotations:
    kubernetes.io/ingress.class:                    "nginx"
    cert-manager.io/cluster-issuer:                 "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # SSE requires chunked transfer  disable buffering
    nginx.ingress.kubernetes.io/proxy-buffering:    "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
spec:
  tls:
    - hosts:
        - whalealert.network
        - api.whalealert.network
      secretName: whale-alert-tls
  rules:
    - host: whalealert.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whale-alert-app-svc
                port:
                  number: 80
    - host: api.whalealert.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whale-alert-app-svc
                port:
                  number: 80
