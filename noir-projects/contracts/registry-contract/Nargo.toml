[package]
name = "provenance_registry"
type = "contract"
version = "0.1.0"
authors = ["Studio Provenance"]

# Aztec.nr provides the core types and macros for writing Aztec contracts in Noir.
# Pin to a specific version to ensure consistent compilation across environments.
[dependencies]
aztec = { git = "https://github.com/AztecProtocol/aztec-packages/", tag = "aztec-packages-v0.62.0", directory = "noir-projects/aztec-nr/aztec" }
