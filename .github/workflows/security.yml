# Sovereign Security CI Pipeline — Axiomas 461–465
# Runs on every push and PR: npm audit, SBOM generation, SLSA provenance

name: Security & Compliance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 03:00 UTC — catch new CVEs on unchanged code
    - cron: '0 3 * * *'

permissions:
  contents: read
  security-events: write
  id-token: write   # Required for SLSA provenance

jobs:
  # ── Job 1: Dependency Audit (Axioma 461) ─────────────────────────────────────
  dependency-audit:
    name: CVE Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (CI — no scripts)
        run: npm ci --ignore-scripts

      - name: npm audit — block on HIGH/CRITICAL
        run: |
          npm audit --audit-level=high --json > npm-audit-report.json || true
          node -e "
            const report = require('./npm-audit-report.json');
            const vulns = report.metadata?.vulnerabilities ?? {};
            const blocking = (vulns.high ?? 0) + (vulns.critical ?? 0);
            console.log('Vulnerability summary:', JSON.stringify(vulns));
            if (blocking > 0) {
              console.error('BLOCKED: ' + blocking + ' HIGH/CRITICAL vulnerabilities found.');
              process.exit(1);
            }
            console.log('Audit passed — no HIGH/CRITICAL vulnerabilities.');
          "

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 90

  # ── Job 2: SBOM Generation — CycloneDX (Axioma 462) ─────────────────────────
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: dependency-audit
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install CycloneDX CLI
        run: npm install -g @cyclonedx/cyclonedx-npm

      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-npm --output-file sbom.json --output-format json
          echo "SBOM generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> sbom.json

      - name: Compute SBOM SHA-256 integrity hash
        run: |
          sha256sum sbom.json > sbom.json.sha256
          echo "SBOM SHA-256: $(cat sbom.json.sha256)"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: |
            sbom.json
            sbom.json.sha256
          retention-days: 365

  # ── Job 3: Type Check & Lint ──────────────────────────────────────────────────
  quality:
    name: TypeScript & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ── Job 4: Unit Tests ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit tests
        run: npm run test:run
        env:
          NODE_ENV: test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ── Job 5: Build Validation ───────────────────────────────────────────────────
  build:
    name: Next.js Production Build
    runs-on: ubuntu-latest
    needs: [dependency-audit, quality]
    env:
      NODE_ENV: production
      NODE_OPTIONS: '--max-old-space-size=4096'
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7
