name: 🐋 Whale Alert Network — Full Sovereign Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip production build (type-check only)'
        required: false
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Static Analysis & Type Validation
  # ─────────────────────────────────────────────────────────────────
  validate:
    name: 🔍 Type & Lint Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🛰️ Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: 🧹 ESLint
        run: npm run lint
        continue-on-error: false

      - name: 🛡️ TypeScript type-check
        run: npx tsc --noEmit
        env:
          SKIP_ENV_VALIDATION: 'true'

      - name: 💎 Prisma Schema Validation
        run: npx prisma validate
        env:
          DATABASE_URL: "postgresql://[REDACTED_DB_USER]:[REDACTED_DB_PASS]@localhost:5432/whalealert?schema=public"

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Smart Contract Security Audit
  # ─────────────────────────────────────────────────────────────────
  contracts:
    name: 📜 Contract Compile & Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: 🔨 Hardhat Compile
        run: npx hardhat compile

      - name: 🛡️ Slither Static Analysis
        uses: crytic/slither-action@v0.4.0
        continue-on-error: true
        with:
          target: 'contracts/'
          sarif: results.sarif

      - name: 📊 Upload Slither SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Production Build (only on pushes to main)
  # ─────────────────────────────────────────────────────────────────
  build:
    name: 🚀 Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: 🗄️ Prisma Generate (no DB needed)
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://[REDACTED_DB_USER]:[REDACTED_DB_PASS]@localhost:5432/whalealert?schema=public"

      - name: 🏗️ Next.js Production Build
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          REDIS_URL: "redis://[REDACTED_REDIS_USER]:[REDACTED_REDIS_PASS]@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

  # ─────────────────────────────────────────────────────────────────
  # JOB 4: Auto-tag on merge to main (Semantic Versioning)
  # ─────────────────────────────────────────────────────────────────
  tag:
    name: 🏷️ Auto-tag Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔖 Bump version & tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: 'v'
